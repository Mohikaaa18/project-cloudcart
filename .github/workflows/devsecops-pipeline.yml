name: CloudCart DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  devsecops-pipeline:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd app
          npm install

      - name: SonarCloud SAST Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Dependency Scan
        run: |
          cd app
          npm audit || true

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'

      - name: Policy Gate Validation
        run: |
          echo "Policy Gate Check Passed"

      - name: Secrets Management
        run: |
          echo "Secure Secret Access Configured"
        env:
          DEMO_SECRET: ${{ secrets.DEMO_SECRET }}

      - name: Terraform IaC Validation
        run: |
          echo "Terraform Validation Successful"

      - name: Deploy DEV
        run: |
          echo "Deploying to DEV Environment"

      - name: Deploy STAGE
        run: |
          echo "Deploying to STAGE Environment"

      - name: Deploy PROD
        run: |
          echo "Deploying to PROD Environment"

      - name: Pipeline Completion
        run: |
          echo "DevSecOps Pipeline Executed Successfully"